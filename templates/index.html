<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor EMG - Laboratorio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Título a la izquierda */
        .header-area { padding: 20px 0; border-bottom: 2px solid #dee2e6; margin-bottom: 30px; }
        h1 { font-size: 1.5rem; color: #333; margin: 0; font-weight: 600; }
        
        /* Contenedor del gráfico con fondo de papel */
        .monitor-container { 
            background: #ffffff; 
            border: 1px solid #ced4da; 
            padding: 20px; 
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Título afuera a la izquierda -->
    <div class="header-area">
        <h1>Monitor de Señal EMG</h1>
    </div>

    <div class="monitor-container">
        <canvas id="emgChart"></canvas>
    </div>
</div>

<script>
    const ctx = document.getElementById('emgChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(50).fill(''),
            datasets: [{
                label: 'Señal EMG',
                data: Array(50).fill(0),
                borderColor: '#0d6efd', // Azul clínico
                borderWidth: 2,
                tension: 0.3, // Línea un poco más suave
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            animation: false,
            scales: {
                y: { 
                    min: 0, max: 4095, 
                    grid: { color: '#e9ecef', drawBorder: true }, // Cuadrícula gris clara
                    ticks: { color: '#495057' } 
                },
                x: { 
                    grid: { color: '#e9ecef' } // Cuadrícula vertical visible
                }
            },
            plugins: { legend: { display: false } }
        }
    });

    const socket = io();
    socket.on('nueva_senal', function(msg) {
        chart.data.datasets[0].data.push(msg.valor);
        chart.data.datasets[0].data.shift();
        chart.update();
    });
</script>
ss
</body>
</html>
