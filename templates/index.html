<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor EMG en Tiempo Real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        body { background-color: #000; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
        .monitor-container { 
            background: #0a0a0a; 
            border: 3px solid #333; 
            padding: 20px; 
            margin-top: 50px; 
            border-radius: 10px;
        }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 5px; color: #00ff00; }
        #emgChart { height: 400px !important; }
    </style>
</head>
<body>

<div class="container monitor-container">
    <h1>Monitorero En Tiempo Real EMG</h1>
    <canvas id="emgChart"></canvas>
</div>

<script>
    const ctx = document.getElementById('emgChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(50).fill(''), // Mantener 50 puntos en pantalla
            datasets: [{
                label: 'Señal EMG',
                data: Array(50).fill(0),
                borderColor: '#00ff00',
                borderWidth: 2,
                tension: 0.1,
                pointRadius: 0 // Estilo osciloscopio limpio
            }]
        },
        options: {
            responsive: true,
            animation: false, // Fundamental para tiempo real
            scales: {
                y: { min: 0, max: 4095, grid: { color: '#222' }, ticks: { color: '#00ff00' } },
                x: { display: false }
            },
            plugins: { legend: { display: false } }
        }
    });

    // Conexión con el servidor Python
    const socket = io();
    socket.on('nueva_senal', function(msg) {
        chart.data.datasets[0].data.push(msg.valor);
        chart.data.datasets[0].data.shift();
        chart.update();
    });
</script>

</body>
</html>
