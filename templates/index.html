<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor EMG Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .header-area { padding: 20px 0; border-bottom: 2px solid #dee2e6; margin-bottom: 30px; }
        h1 { font-size: 1.5rem; color: #333; font-weight: 600; }
        .monitor-container { background: #ffffff; border: 1px solid #ced4da; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { background: #fff; padding: 20px; border: 1px solid #ced4da; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>Monitor de Señal EMG</h1>
    </div>

    <div class="row">
        <div class="col-md-9 monitor-container">
            <canvas id="emgChart"></canvas>
        </div>

        <div class="col-md-3">
            <div class="controls text-center">
                <h5>Controles</h5>
                <button id="btnIniciar" class="btn btn-success w-100 mb-2">Iniciar</button>
                <button id="btnDetener" class="btn btn-danger w-100 mb-3">Detener</button>
                
                <div class="mt-4 text-start">
                    <label for="umbralRange" class="form-label">Umbral: <span id="valUmbral" class="fw-bold">2000</span></label>
                    <input type="range" class="form-range" id="umbralRange" min="0" max="4095" value="2000">
                </div>

                <p id="status" class="mt-4 text-muted">Estado: Detenido</p>
            </div>
        </div>
    </div>
</div>

<script>
    
const socket = io({ transports: ['polling', 'websocket'] });

const ctx = document.getElementById('emgChart').getContext('2d');
    
    // Configuración de la Gráfica con Anotaciones
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(1500).fill(''),
            datasets: [{
                data: Array(1500).fill(0),
                borderColor: '#0d6efd',
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 0
            }]
        },

        options: {
            responsive: true,
            animation: false,
            scales: {
                y: { min: 0, max: 4095, grid: { color: '#e9ecef' } },
                x: { grid: { color: '#e9ecef' } }
            },
            plugins: {
                legend: { display: false },
                annotation: {
                    annotations: {
                        lineaUmbral: {
                            type: 'line',
                            yMin: 2000,
                            yMax: 2000,
                            borderColor: 'rgb(255, 99, 132)',
                            borderWidth: 2,
                            borderDash: [6, 6],
                            label: { display: true, content: 'Umbral', position: 'start' }
                        }
                    }
                }
            }
        }
    });

    // Lógica de Control
    const btnIniciar = document.getElementById('btnIniciar');
    const btnDetener = document.getElementById('btnDetener');
    const slider = document.getElementById('umbralRange');
    const displayVal = document.getElementById('valUmbral');
    const statusText = document.getElementById('status');

    btnIniciar.addEventListener('click', () => {
        socket.emit('control_sistema', { estado: 'iniciar' });
        statusText.innerText = "Estado: Recibiendo...";
    });

    btnDetener.addEventListener('click', () => {
        socket.emit('control_sistema', { estado: 'detener' });
        statusText.innerText = "Estado: Detenido";
    });

    slider.addEventListener('input', (e) => {
        let nuevoUmbral = parseInt(e.target.value);
        displayVal.innerText = nuevoUmbral;
        
        // Actualizar la línea de anotación en tiempo real
        chart.options.plugins.annotation.annotations.lineaUmbral.yMin = nuevoUmbral;
        chart.options.plugins.annotation.annotations.lineaUmbral.yMax = nuevoUmbral;
        chart.update();
        
        socket.emit('cambiar_umbral', { valor: nuevoUmbral });
    });

    // Recepción de datos del servidor
    socket.on('nueva_senal', function(msg) {
        chart.data.datasets[0].data.push(msg.valor);
        chart.data.datasets[0].data.shift();
        chart.update();
    });
</script>

</body>
</html>
